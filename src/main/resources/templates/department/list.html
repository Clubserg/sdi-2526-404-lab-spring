<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-spring4-4.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="fragments/head"><title>Listado de Departamentos</title></head>
<body>

<nav th:replace="fragments/nav"></nav>

<div class="container" id="main-container">
    <h2 class="mt-4">Departamentos</h2>

    <form class="form-inline" action="/departments">
        <div class="form-group">
            <input name="searchText" type="text" class="form-control" size="50"
                   placeholder="Buscar por nombre de departamento">
        </div>
        <button type="submit" class="btn btn-primary">Buscar</button>
    </form>

    <p>Los departamentos registrados en el sistema son:</p>

    <button type="button" id="updateButton" class="btn btn-primary">Actualizar</button>

    <script th:inline="javascript">
        /*<![CDATA[*/
        $("#updateButton").click(function () {
            let page = /*[[${param.page != null and !#lists.isEmpty(param.page) ? param.page[0] : null}]]*/ null;
            let urlUpdate = '/departments/update';
            if (page != null) {
                urlUpdate += "?page=" + page;
            }
            // Recarga el div inferior con el fragmento que devuelve el controlador
            $("#departmentsTable").load(urlUpdate);
        });
        /*]]>*/
    </script>

    <div id="departmentsTable">
        <div th:fragment="tableDepartments" class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Código</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Facultad</th>
                    <th scope="col">Teléfono</th>
                    <th scope="col">Profesores</th>
                    <th scope="col"></th><th scope="col"></th><th scope="col"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="dept : ${departmentList}">
                    <td th:text="${dept.id}">1</td>
                    <td th:text="${dept.code}">D01</td>
                    <td th:text="${dept.name}">Informática</td>
                    <td th:text="${dept.faculty}">Escuela de Ingeniería</td>
                    <td th:text="${dept.phone}">985101010</td>
                    <td th:text="${dept.professors}">25</td>
                    <td><a sec:authorize="hasAnyRole('PROFESSOR', 'ADMIN')" th:href="${'/departments/details/' + dept.id}"> detalles</a></td>
                    <td><a sec:authorize="hasRole('ADMIN')" th:href="${'/departments/edit/' + dept.id}"> modificar</a></td>
                    <td><a sec:authorize="hasRole('ADMIN')" th:href="${'/departments/delete/' + dept.id}"> eliminar</a></td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(departmentList)}" class="alert alert-info">
                No hay departamentos registrados.
            </div>

            <footer th:replace="fragments/pagination"></footer>
        </div>
    </div>
</div>

<footer th:replace="fragments/footer"></footer>
</body>
</html>
